version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssml-tts-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - ssml-tts-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ssml-tts-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ssml-tts-network

networks:
  ssml-tts-network:
    driver: bridge